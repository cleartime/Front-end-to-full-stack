services:
  postgres:
    image: postgres:16-alpine
    container_name: fullstack-transition-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fullstack
      POSTGRES_PASSWORD: fullstack123
      POSTGRES_DB: fullstack_lab
    ports:
      - "5432:5432"
    volumes:
      - fullstack_transition_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullstack -d fullstack_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fullstack_transition_pgdata:
